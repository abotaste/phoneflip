<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PhoneFlip</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
@font-face { font-family: 'Bebas Neue'; font-display: swap; }
@font-face { font-family: 'DM Sans'; font-display: swap; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
–bg: #07070f; –card: #0e0e1c; –card2: #141428; –border: #222238;
–green: #00e87a; –red: #ff3c5a; –gold: #ffb800; –blue: #4d8dff;
–purple: #a855f7; –text: #ffffff; –muted: #7777aa;
}

html, body { height: 100%; height: 100dvh; overflow: hidden; background: #07070f; color: #fff; font-family: ‘DM Sans’, -apple-system, sans-serif; }
body { display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; padding-top: env(safe-area-inset-top, 0px); padding-bottom: env(safe-area-inset-bottom, 0px); }

/* TOPBAR */
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 8px; flex-shrink: 0; background: #07070f; }
.logo { font-family: ‘Bebas Neue’, Impact, sans-serif; font-size: 34px; letter-spacing: 2px; background: linear-gradient(120deg, #a855f7, #4d8dff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.top-right { display: flex; gap: 10px; align-items: center; }
.live-badge { display: flex; align-items: center; gap: 6px; background: rgba(168,85,247,.12); border: 1.5px solid rgba(168,85,247,.3); border-radius: 30px; padding: 7px 14px; font-size: 13px; font-weight: 700; color: #a855f7; }
.live-dot { width: 8px; height: 8px; border-radius: 50%; background: #a855f7; box-shadow: 0 0 6px #a855f7; animation: blink 1.5s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
.saved-badge { background: #141428; border: 1.5px solid #222238; border-radius: 30px; padding: 7px 16px; font-size: 14px; font-weight: 700; cursor: pointer; color: #fff; }

/* STATS */
.stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; padding: 0 20px 10px; flex-shrink: 0; background: #07070f; }
.stat { background: #0e0e1c; border: 1.5px solid #222238; border-radius: 16px; padding: 10px 6px; text-align: center; }
.stat-label { font-size: 10px; color: #7777aa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.stat-value { font-family: ‘Bebas Neue’, Impact, sans-serif; font-size: 22px; color: #a855f7; }

/* CARD AREA */
.card-area { flex: 1; min-height: 0; position: relative; padding: 0 16px; background: #07070f; }
.shadow-card { position: absolute; inset: 0 16px; background: #0e0e1c; border: 1.5px solid #222238; border-radius: 24px; transform-origin: bottom center; }
.shadow-card:nth-child(1) { transform: translateY(8px) scale(.96); opacity: .4; }
.shadow-card:nth-child(2) { transform: translateY(16px) scale(.92); opacity: .2; }
.main-card { position: absolute; inset: 0; background: #0e0e1c; border: 1.5px solid #222238; border-radius: 24px; overflow-y: scroll; overflow-x: hidden; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.main-card::-webkit-scrollbar { display: none; }

/* SWIPE HINTS */
.swipe-hint { position: absolute; top: 20px; z-index: 20; padding: 8px 16px; border-radius: 10px; font-family: ‘Bebas Neue’, Impact, sans-serif; font-size: 22px; letter-spacing: 1px; opacity: 0; pointer-events: none; }
.hint-save { left: 16px; background: rgba(0,232,122,.15); border: 2px solid #00e87a; color: #00e87a; }
.hint-skip { right: 16px; background: rgba(255,60,90,.15); border: 2px solid #ff3c5a; color: #ff3c5a; }

/* CARD CONTENT */
.deal-foto { width: 100%; height: 200px; object-fit: cover; border-bottom: 1.5px solid #222238; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #141428, #0e0e1c); font-size: 80px; }
.section { padding: 16px 18px; border-bottom: 1.5px solid #222238; background: #0e0e1c; }

/* BADGES */
.badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 8px; text-transform: uppercase; letter-spacing: .4px; }
.b-hot { background: rgba(255,60,90,.15); color: #ff3c5a; border: 1.5px solid rgba(255,60,90,.3); }
.b-dmg { background: rgba(255,184,0,.12); color: #ffb800; border: 1.5px solid rgba(255,184,0,.3); }
.b-ok  { background: rgba(0,232,122,.08); color: #00e87a; border: 1.5px solid rgba(0,232,122,.2); }
.b-iphone { background: rgba(77,141,255,.1); color: #4d8dff; border: 1.5px solid rgba(77,141,255,.3); }
.b-sam { background: rgba(0,180,255,.1); color: #00b4ff; border: 1.5px solid rgba(0,180,255,.3); }

.deal-title { font-family: ‘Bebas Neue’, Impact, sans-serif; font-size: 26px; letter-spacing: .5px; line-height: 1.2; margin-bottom: 5px; }
.deal-sub { font-size: 14px; color: #7777aa; }

/* PRIJZEN */
.price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #222238; border-bottom: 1.5px solid #222238; }
.price-box { background: #0e0e1c; padding: 16px 18px; }
.price-lbl { font-size: 11px; color: #7777aa; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 4px; }
.price-num { font-family: ‘Bebas Neue’, Impact, sans-serif; font-size: 34px; line-height: 1; }
.p-inkoop { color: #ffb800; }
.p-verkoop { color: #00e87a; }

/* WINST BANNER */
.winst-banner { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; background: linear-gradient(135deg, rgba(168,85,247,.07), rgba(77,141,255,.04)); border-bottom: 1.5px solid rgba(168,85,247,.12); }
.w-lbl { font-size: 11px; color: #7777aa; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 3px; }
.w-val { font-size: 14px; color: #7777aa; }
.winst-num { font-family: ‘Bebas Neue’, Impact, sans-serif; font-size: 36px; color: #00e87a; text-align: right; line-height: 1; }
.winst-perc { font-size: 16px; opacity: .6; }

/* SPECS */
.specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #222238; border-bottom: 1.5px solid #222238; }
.spec-box { background: #0e0e1c; padding: 13px 18px; }
.spec-lbl { font-size: 10px; color: #7777aa; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 4px; }
.spec-val { font-size: 15px; font-weight: 600; }

/* TIP BOX */
.tip-box { margin-top: 12px; background: rgba(0,232,122,.05); border: 1.5px solid rgba(0,232,122,.15); border-radius: 12px; padding: 12px 14px; }
.tip-title { font-size: 11px; color: #00e87a; text-transform: uppercase; letter-spacing: .8px; font-weight: 700; margin-bottom: 5px; }
.tip-text { font-size: 13px; color: #7777aa; line-height: 1.65; }

/* SCHADE BOX */
.schade-box { margin-top: 12px; background: rgba(255,184,0,.06); border: 1.5px solid rgba(255,184,0,.2); border-radius: 12px; padding: 12px 14px; }
.schade-title { font-size: 11px; color: #ffb800; text-transform: uppercase; letter-spacing: .8px; font-weight: 700; margin-bottom: 5px; }
.box-text { font-size: 13px; color: #7777aa; line-height: 1.65; }

/* BUTTONS */
.btn-row { display: flex; gap: 10px; margin-top: 14px; }
.link-btn { flex: 1; text-align: center; background: #141428; border: 1.5px solid #222238; border-radius: 12px; padding: 14px 8px; font-size: 13px; font-weight: 700; color: #7777aa; text-decoration: none; display: block; }
.link-btn:active { transform: scale(.96); }
.link-btn-mp { color: #a855f7; border-color: rgba(168,85,247,.3); background: rgba(168,85,247,.07); font-size: 15px; }

/* PROGRESS */
.progress { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 14px; background: #0e0e1c; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #222238; transition: all .25s; }
.dot.active { background: #a855f7; transform: scale(1.5); box-shadow: 0 0 6px #a855f7; }
.dot.done { background: #7777aa; }

/* ACTIONS */
.actions { display: grid; grid-template-columns: 1fr 1.6fr 1fr; gap: 12px; padding: 12px 20px 16px; flex-shrink: 0; background: #07070f; }
.action-btn { border: none; border-radius: 20px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; font-family: ‘DM Sans’, sans-serif; transition: transform .15s; }
.action-btn:active { transform: scale(.90); }
.btn-skip { background: rgba(255,60,90,.1); border: 1.5px solid rgba(255,60,90,.25); color: #ff3c5a; padding: 16px 8px; }
.btn-save { background: linear-gradient(135deg, #a855f7, #4d8dff); color: #fff; padding: 18px 8px; font-weight: 800; box-shadow: 0 6px 28px rgba(168,85,247,.3); }
.btn-next { background: rgba(77,141,255,.1); border: 1.5px solid rgba(77,141,255,.25); color: #4d8dff; padding: 16px 8px; }
.btn-icon { font-size: 28px; }
.btn-label { font-size: 11px; font-weight: 700; opacity: .7; text-transform: uppercase; letter-spacing: .8px; }

/* STATE SCREENS */
.state-screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; text-align: center; padding: 32px; background: #0e0e1c; border-radius: 24px; }
.state-icon { font-size: 64px; }
.state-title { font-family: ‘Bebas Neue’, Impact, sans-serif; font-size: 36px; }
.state-sub { font-size: 15px; color: #7777aa; line-height: 1.7; }
.reload-btn { background: linear-gradient(135deg, #a855f7, #4d8dff); color: #fff; border: none; border-radius: 16px; padding: 16px 36px; font-family: ‘Bebas Neue’, Impact, sans-serif; font-size: 22px; cursor: pointer; box-shadow: 0 6px 24px rgba(168,85,247,.3); margin-top: 8px; }

/* SAVED PANEL */
#saved-panel { position: fixed; inset: 0; background: #07070f; z-index: 100; display: none; flex-direction: column; max-width: 430px; margin: 0 auto; padding-top: env(safe-area-inset-top, 0px); padding-bottom: env(safe-area-inset-bottom, 0px); }
.panel-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px 14px; border-bottom: 1.5px solid #222238; flex-shrink: 0; }
.panel-title { font-family: ‘Bebas Neue’, Impact, sans-serif; font-size: 30px; color: #a855f7; }
.close-btn { background: #141428; border: 1.5px solid #222238; border-radius: 50%; width: 42px; height: 42px; cursor: pointer; color: #fff; font-size: 18px; display: flex; align-items: center; justify-content: center; }
#saved-list { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
.saved-item { background: #0e0e1c; border: 1.5px solid rgba(168,85,247,.2); border-radius: 18px; padding: 16px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.si-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; line-height: 1.3; }
.si-meta { font-size: 13px; color: #7777aa; margin-bottom: 10px; }
.si-winst { font-family: ‘Bebas Neue’, Impact, sans-serif; font-size: 26px; color: #00e87a; text-align: right; }
.si-lbl { font-size: 11px; color: #7777aa; text-align: right; }
.open-btn { display: block; background: rgba(168,85,247,.08); border: 1.5px solid rgba(168,85,247,.25); color: #a855f7; border-radius: 10px; padding: 10px 14px; font-size: 13px; font-weight: 700; text-decoration: none; text-align: center; }
.empty-saved { text-align: center; padding: 60px 20px; color: #7777aa; }
.empty-saved .ei { font-size: 56px; margin-bottom: 14px; }
.empty-saved p { font-size: 15px; line-height: 1.7; }
</style>

</head>

</div>

<div id="saved-panel">

    heeftSchade: false, hot: true,
  },
];

// ── STATE ─────────────────────────────────────────────────────────────
let cur = 0, saved = [];
let isAnim = false, tx = 0, ty = 0, dx = 0, dragging = false;

// ── BOOT ──────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  updateStats();
  toonDeal();
  initSwipe();
});

function updateStats() {
  document.getElementById('s-leads').textContent = DEALS.length;
  const marges = DEALS.map(d => d.verkoop - d.inkoop);
  const gem = Math.round(marges.reduce((a,b)=>a+b,0)/marges.length);
  document.getElementById('s-marge').textContent = '€' + gem.toLocaleString('nl-NL');
  document.getElementById('s-best').textContent = '€' + Math.max(...marges).toLocaleString('nl-NL');
}

// ── RENDER ────────────────────────────────────────────────────────────
function toonDeal() {
  const card = document.getElementById('main-card');
  card.style.cssText = 'transform:none;opacity:1;transition:none';

  if (cur >= DEALS.length) {
    card.innerHTML = `<div class="state-screen">
      <div class="state-icon">✅</div>
      <div class="state-title">Klaar!</div>
      <div class="state-sub">Je hebt alle deals bekeken.<br>Opnieuw beginnen?</div>
      <button class="reload-btn" onclick="cur=0;toonDeal()">⚡ Opnieuw</button>
    </div>`;
    return;
  }

  const d = DEALS[cur];
  const winst = d.verkoop - d.inkoop;
  const winstPerc = Math.round(winst / d.inkoop * 100);

  const badges = d.badges.map((b,i) => `<span class="badge ${b}">${d.badgeTekst[i]}</span>`).join('');
  const dots = DEALS.map((_,i) => `<div class="dot ${i===cur?'active':i<cur?'done':''}"></div>`).join('');

  const schadeHtml = d.schade ? `
    <div class="schade-box">
      <div class="schade-title">⚠️ Let op bij schade</div>
      <div class="box-text">${d.schade}</div>
    </div>` : '';

  const tipHtml = `
    <div class="tip-box">
      <div class="tip-title">💡 Deal strategie</div>
      <div class="tip-text">${d.tip}</div>
    </div>`;

  card.innerHTML = `
    <div class="swipe-hint hint-save" id="hint-save">OPSLAAN ✓</div>
    <div class="swipe-hint hint-skip" id="hint-skip">SKIP ✕</div>

    <div class="deal-foto">${d.emoji}</div>

    <div class="section">
      <div class="badges">${badges}</div>
      <div class="deal-title">${d.titel}</div>
      <div class="deal-sub">Live Marktplaats zoekresultaten</div>
    </div>

    <div class="price-grid">
      <div class="price-box">
        <div class="price-lbl">Max inkoop</div>
        <div class="price-num p-inkoop">€${d.inkoop.toLocaleString('nl-NL')}</div>
      </div>
      <div class="price-box">
        <div class="price-lbl">Verkoopprijs</div>
        <div class="price-num p-verkoop">€${d.verkoop.toLocaleString('nl-NL')}</div>
      </div>
    </div>

    <div class="winst-banner">
      <div>
        <div class="w-lbl">Marktwaarde</div>
        <div class="w-val">€${d.marktwaarde.toLocaleString('nl-NL')}</div>
      </div>
      <div>
        <div class="w-lbl" style="text-align:right">Potentiële winst</div>
        <div class="winst-num">+€${winst.toLocaleString('nl-NL')} <span class="winst-perc">${winstPerc}%</span></div>
      </div>
    </div>

    <div class="specs-grid">
      <div class="spec-box"><div class="spec-lbl">Opslag</div><div class="spec-val">${d.specs.opslag}</div></div>
      <div class="spec-box"><div class="spec-lbl">Batterij</div><div class="spec-val">${d.specs.batterij}</div></div>
      <div class="spec-box"><div class="spec-lbl">Staat</div><div class="spec-val">${d.specs.staat}</div></div>
      <div class="spec-box"><div class="spec-lbl">Merk</div><div class="spec-val">${d.specs.merk}</div></div>
    </div>

    <div class="section">
      ${tipHtml}
      ${schadeHtml}
      <a class="link-btn link-btn-mp" href="${d.mpUrl}" target="_blank" style="margin-top:14px;display:block">
        🔍 Open live Marktplaats deals →
      </a>
    </div>

    <div class="progress">${dots}</div>
  `;
}

// ── SWIPE ─────────────────────────────────────────────────────────────
function initSwipe() {
  const card = document.getElementById('main-card');
  card.addEventListener('touchstart', e => {
    if (isAnim) return;
    tx = e.touches[0].clientX; ty = e.touches[0].clientY; dx = 0; dragging = false;
  }, { passive: true });

  card.addEventListener('touchmove', e => {
    if (isAnim) return;
    const ddx = e.touches[0].clientX - tx;
    const ddy = e.touches[0].clientY - ty;
    if (!dragging && Math.abs(ddy) > Math.abs(ddx)) return;
    dragging = true; e.preventDefault(); dx = ddx;
    card.style.transition = 'none';
    card.style.transform = `translateX(${dx}px) rotate(${dx*.04}deg)`;
    const hs = document.getElementById('hint-save');
    const hk = document.getElementById('hint-skip');
    if (hs && hk) {
      hs.style.opacity = dx > 60 ? Math.min((dx-60)/70, 1) : 0;
      hk.style.opacity = dx < -60 ? Math.min((-dx-60)/70, 1) : 0;
    }
  }, { passive: false });

  card.addEventListener('touchend', () => {
    if (!dragging) return; dragging = false;
    if (dx > 110) saveDeal();
    else if (dx < -110) skipDeal();
    else {
      card.style.transition = 'transform .35s cubic-bezier(.22,.68,0,1.2)';
      card.style.transform = 'none';
      const hs = document.getElementById('hint-save');
      const hk = document.getElementById('hint-skip');
      if (hs) hs.style.opacity = 0;
      if (hk) hk.style.opacity = 0;
    }
  }, { passive: true });
}

// ── ACTIES ────────────────────────────────────────────────────────────
function animOut(dir, cb) {
  isAnim = true;
  const card = document.getElementById('main-card');
  card.style.transition = 'transform .28s ease, opacity .28s ease';
  card.style.transform = `translateX(${dir==='r'?500:-500}px) rotate(${dir==='r'?15:-15}deg)`;
  card.style.opacity = '0';
  setTimeout(() => { isAnim = false; cb(); initSwipe(); }, 290);
}

function skipDeal() { if (!isAnim) animOut('l', () => { cur++; toonDeal(); }); }
function nextDeal() { if (!isAnim) animOut('l', () => { cur++; toonDeal(); }); }
function saveDeal() {
  if (isAnim || cur >= DEALS.length) return;
  saved.push(DEALS[cur]);
  document.getElementById('saved-count').textContent = saved.length;
  renderSaved();
  animOut('r', () => { cur++; toonDeal(); });
}

// ── SAVED ─────────────────────────────────────────────────────────────
function openSaved()  { const p = document.getElementById('saved-panel'); p.style.display = 'flex'; p.style.flexDirection = 'column'; }
function closeSaved() { document.getElementById('saved-panel').style.display = 'none'; }

function renderSaved() {
  const list = document.getElementById('saved-list');
  if (!saved.length) {
    list.innerHTML = '<div class="empty-saved"><div class="ei">📭</div><p>Nog niets opgeslagen.<br>Swipe rechts of druk 💾.</p></div>';
    return;
  }
  list.innerHTML = saved.map(d => {
    const winst = d.verkoop - d.inkoop;
    return `<div class="saved-item">
      <div style="flex:1;min-width:0">
        <div class="si-title">${d.emoji} ${d.titel}</div>
        <div class="si-meta">Max inkoop: <strong style="color:#ffb800">€${d.inkoop}</strong> · Verkoop: €${d.verkoop}</div>
        <a class="open-btn" href="${d.mpUrl}" target="_blank">🔍 Open Marktplaats deals</a>
      </div>
      <div style="flex-shrink:0;padding-left:8px">
        <div class="si-winst">+€${winst}</div>
        <div class="si-lbl">winst</div>
      </div>
    </div>`;
  }).join('');
}
</script>

</body>
</html>
