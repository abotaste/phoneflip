<!DOCTYPE html>

<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>PhoneFlip</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'Bebas Neue';
  font-display: swap;
}
@font-face {
  font-family: 'DM Sans';
  font-display: swap;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

/* FORCEER DONKER THEMA OVERAL */
html { background: #07070f !important; color-scheme: dark; }
body { background: #07070f !important; }
.main-card { background: #0e0e1c !important; }
.section { background: #0e0e1c !important; }
.price-box { background: #0e0e1c !important; }
.spec-box { background: #0e0e1c !important; }
.c-contact { background: #141428 !important; }
.topbar { background: #07070f !important; }
.stats { background: #07070f !important; }
.card-area { background: #07070f !important; }
.actions { background: #07070f !important; }
.stat { background: #0e0e1c !important; }
.saved-badge { background: #141428 !important; color: #ffffff !important; }
.live-badge { background: rgba(0,232,122,.1) !important; }

:root {
–bg: #050508;
–card: #0a0a16;
–card2: #0f0f20;
–border: #1a1a30;
–green: #00e87a;
–red: #ff3c5a;
–gold: #ffb800;
–blue: #4d8dff;
–text: #ffffff;
–muted: #7777aa;
}

html, body {
height: 100%;
height: 100dvh;
overflow: hidden;
background: var(–bg);
font-family: ‘DM Sans’, -apple-system, sans-serif;
color: var(–text);
}

body {
display: flex;
flex-direction: column;
max-width: 430px;
margin: 0 auto;
padding-top: env(safe-area-inset-top);
padding-bottom: env(safe-area-inset-bottom);
}

/* ── TOPBAR ── */
.topbar {
display: flex;
align-items: center;
justify-content: space-between;
padding: 14px 20px 8px;
flex-shrink: 0;
}

.logo {
font-family: ‘Bebas Neue’, Impact, Arial Black, sans-serif;
font-size: 36px;
letter-spacing: 2px;
background: linear-gradient(120deg, #a855f7, #4d8dff);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
}

.top-right { display: flex; gap: 10px; align-items: center; }

.live-badge {
display: flex;
align-items: center;
gap: 6px;
background: rgba(0,232,122,.1);
border: 1.5px solid rgba(0,232,122,.25);
border-radius: 30px;
padding: 7px 14px;
font-size: 13px;
font-weight: 700;
color: var(–green);
letter-spacing: .5px;
}

.live-dot {
width: 8px; height: 8px;
border-radius: 50%;
background: var(–green);
box-shadow: 0 0 6px var(–green);
animation: blink 1.5s ease-in-out infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

.saved-badge {
background: var(–card2);
border: 1.5px solid var(–border);
border-radius: 30px;
padding: 7px 16px;
font-size: 14px;
font-weight: 700;
cursor: pointer;
color: var(–text);
}

/* ── STATS ── */
.stats {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 8px;
padding: 0 20px 10px;
flex-shrink: 0;
}

.stat {
background: #080812;
border: 1.5px solid #1a1a2e;
border-radius: 16px;
padding: 10px 6px;
text-align: center;
}

.stat-label {
font-size: 10px;
color: var(–muted);
text-transform: uppercase;
letter-spacing: 1px;
margin-bottom: 4px;
}

.stat-value {
font-family: ‘Bebas Neue’, Impact, Arial Black, sans-serif;
font-size: 22px;
color: var(–green);
}

/* ── CARD AREA ── */
.card-area {
flex: 1;
min-height: 0;
position: relative;
padding: 0 16px;
}

/* Stack shadow cards */
.shadow-card {
position: absolute;
inset: 0 16px;
background: var(–card);
border: 1.5px solid var(–border);
border-radius: 24px;
transform-origin: bottom center;
}
.shadow-card:nth-child(1) { transform: translateY(8px) scale(.96); opacity: .4; }
.shadow-card:nth-child(2) { transform: translateY(16px) scale(.92); opacity: .2; }

/* Main card */
.main-card {
position: absolute;
inset: 0;
background: var(–card);
border: 1.5px solid var(–border);
border-radius: 24px;
overflow-y: scroll;
overflow-x: hidden;
-webkit-overflow-scrolling: touch;
scrollbar-width: none;
}
.main-card::-webkit-scrollbar { display: none; }

/* Swipe hints */
.swipe-hint {
position: absolute;
top: 20px;
z-index: 20;
padding: 8px 16px;
border-radius: 10px;
font-family: ‘Bebas Neue’, Impact, Arial Black, sans-serif;
font-size: 22px;
letter-spacing: 1px;
opacity: 0;
pointer-events: none;
transition: opacity .1s;
}
.hint-save { left: 16px; background: rgba(0,232,122,.15); border: 2px solid var(–green); color: var(–green); }
.hint-skip { right: 16px; background: rgba(255,60,90,.15); border: 2px solid var(–red); color: var(–red); }

/* ── FOTO ── */
.car-photo {
width: 100%;
height: 200px;
object-fit: cover;
border-bottom: 1.5px solid var(–border);
display: block;
}

/* ── CARD SECTIONS ── */
.section {
padding: 16px 18px;
border-bottom: 1.5px solid #1a1a30;
background: #0a0a16;
}

/* Badges */
.badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.badge {
font-size: 12px;
font-weight: 700;
padding: 5px 11px;
border-radius: 8px;
text-transform: uppercase;
letter-spacing: .4px;
}
.b-hot { background: rgba(255,60,90,.15); color: var(–red); border: 1.5px solid rgba(255,60,90,.3); }
.b-dmg { background: rgba(255,184,0,.12); color: var(–gold); border: 1.5px solid rgba(255,184,0,.3); }
.b-hyb { background: rgba(77,141,255,.12); color: var(–blue); border: 1.5px solid rgba(77,141,255,.3); }
.b-urg { background: rgba(255,130,60,.12); color: #ff9060; border: 1.5px solid rgba(255,130,60,.3); }
.b-ok  { background: rgba(0,232,122,.08); color: var(–green); border: 1.5px solid rgba(0,232,122,.2); }
.b-live { background: rgba(0,232,122,.08); color: var(–green); border: 1.5px solid rgba(0,232,122,.2); }

/* Title */
.car-title {
font-family: ‘Bebas Neue’, Impact, Arial Black, sans-serif;
font-size: 28px;
letter-spacing: .5px;
line-height: 1.15;
margin-bottom: 5px;
}
.car-sub { font-size: 14px; color: var(–muted); }

/* Price grid */
.price-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 1px;
background: var(–border);
border-bottom: 1.5px solid var(–border);
}
.price-box {
background: #09091a;
padding: 16px 18px;
}
.price-lbl { font-size: 11px; color: var(–muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 4px; }
.price-num { font-family: ‘Bebas Neue’, Impact, Arial Black, sans-serif; font-size: 34px; line-height: 1; }
.p-ask { color: var(–text); }
.p-bid { color: var(–gold); }

/* Winst banner */
.winst-banner {
display: flex;
align-items: center;
justify-content: space-between;
padding: 14px 18px;
background: linear-gradient(135deg, rgba(0,232,122,.1), rgba(0,196,255,.06));
border-bottom: 1.5px solid rgba(0,232,122,.12);
}
.winst-left .lbl { font-size: 11px; color: var(–muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 3px; }
.winst-left .val { font-size: 15px; color: var(–muted); }
.winst-right .lbl { font-size: 11px; color: var(–muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 3px; text-align: right; }
.winst-num { font-family: ‘Bebas Neue’, Impact, Arial Black, sans-serif; font-size: 36px; color: var(–green); text-align: right; line-height: 1; }
.winst-perc { font-size: 16px; opacity: .6; }

/* Specs */
.specs-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 1px;
background: var(–border);
border-bottom: 1.5px solid var(–border);
}
.spec-box { background: #09091a; padding: 13px 18px; }
.spec-lbl { font-size: 10px; color: var(–muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 4px; }
.spec-val { font-size: 15px; font-weight: 600; }

/* Beschrijving */
.desc-text { font-size: 14px; color: var(–muted); line-height: 1.7; }

/* Buttons */
.btn-row { display: flex; gap: 10px; margin-top: 14px; }
.link-btn {
flex: 1;
text-align: center;
background: #0a0a18;
border: 1.5px solid #1a1a30;
border-radius: 12px;
padding: 13px 8px;
font-size: 13px;
font-weight: 700;
color: var(–muted);
text-decoration: none;
transition: all .15s;
}
.link-btn:active { transform: scale(.96); }
.link-btn-mp { color: var(–green); border-color: rgba(0,232,122,.25); background: rgba(0,232,122,.06); }

/* Progress dots */
.progress {
display: flex;
align-items: center;
justify-content: center;
gap: 6px;
padding: 14px;
}
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(–border); transition: all .25s; }
.dot.active { background: var(–green); transform: scale(1.5); box-shadow: 0 0 6px var(–green); }
.dot.done { background: var(–muted); }

/* ── ACTION BUTTONS ── */
.actions {
display: grid;
grid-template-columns: 1fr 1.6fr 1fr;
gap: 12px;
padding: 12px 20px 16px;
flex-shrink: 0;
}

.action-btn {
border: none;
border-radius: 20px;
cursor: pointer;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 5px;
font-family: ‘DM Sans’, sans-serif;
transition: all .15s;
-webkit-tap-highlight-color: transparent;
}

.action-btn:active { transform: scale(.90); }

.btn-skip {
background: #1a0810;
border: 1.5px solid rgba(255,60,90,.35);
color: var(–red);
padding: 16px 8px;
}

.btn-save {
background: linear-gradient(135deg, #a855f7, #4d8dff);
color: var(–text);
padding: 18px 8px;
font-weight: 800;
box-shadow: 0 6px 28px rgba(0,232,122,.3);
}

.btn-next {
background: #080e1a;
border: 1.5px solid rgba(77,141,255,.35);
color: var(–blue);
padding: 16px 8px;
}

.btn-icon { font-size: 28px; }
.btn-label { font-size: 11px; font-weight: 700; opacity: .7; text-transform: uppercase; letter-spacing: .8px; }

/* ── STATE CARDS ── */
.state-screen {
position: absolute;
inset: 0;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 16px;
text-align: center;
padding: 32px;
}

.state-icon { font-size: 64px; }
.state-title { font-family: ‘Bebas Neue’, Impact, Arial Black, sans-serif; font-size: 36px; letter-spacing: .5px; }
.state-sub { font-size: 15px; color: var(–muted); line-height: 1.7; }

.spinner {
width: 52px; height: 52px;
border: 4px solid var(–border);
border-top-color: var(–green);
border-radius: 50%;
animation: spin .9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.reload-btn {
background: linear-gradient(135deg, #a855f7, #4d8dff);
color: var(–text);
border: none;
border-radius: 16px;
padding: 16px 36px;
font-family: ‘Bebas Neue’, Impact, Arial Black, sans-serif;
font-size: 22px;
cursor: pointer;
letter-spacing: .5px;
box-shadow: 0 6px 24px rgba(0,232,122,.25);
}

/* ── SAVED PANEL ── */
#saved-panel {
position: fixed;
inset: 0;
background: #050508;
z-index: 100;
display: none;
flex-direction: column;
max-width: 430px;
margin: 0 auto;
padding-top: env(safe-area-inset-top);
padding-bottom: env(safe-area-inset-bottom);
}

.panel-header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 18px 20px 14px;
border-bottom: 1.5px solid var(–border);
flex-shrink: 0;
}

.panel-title { font-family: ‘Bebas Neue’, Impact, Arial Black, sans-serif; font-size: 30px; color: var(–green); }

.close-btn {
background: var(–card2);
border: 1.5px solid var(–border);
border-radius: 50%;
width: 42px; height: 42px;
cursor: pointer;
color: var(–text);
font-size: 18px;
display: flex; align-items: center; justify-content: center;
}

#saved-list { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }

.saved-item {
background: #0a0a16;
border: 1.5px solid rgba(0,232,122,.2);
border-radius: 18px;
padding: 16px;
display: flex;
align-items: flex-start;
justify-content: space-between;
gap: 12px;
}

.si-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; line-height: 1.3; }
.si-meta { font-size: 13px; color: var(–muted); margin-bottom: 10px; }
.si-winst { font-family: ‘Bebas Neue’, Impact, Arial Black, sans-serif; font-size: 28px; color: var(–green); text-align: right; }
.si-lbl { font-size: 11px; color: var(–muted); text-align: right; }

.open-btn {
display: block;
background: rgba(0,232,122,.08);
border: 1.5px solid rgba(0,232,122,.25);
color: var(–green);
border-radius: 10px;
padding: 10px 14px;
font-size: 13px;
font-weight: 700;
text-decoration: none;
text-align: center;
}

.empty-saved { text-align: center; padding: 60px 20px; color: var(–muted); }
.empty-saved .ei { font-size: 56px; margin-bottom: 14px; }
.empty-saved p { font-size: 15px; line-height: 1.7; }
</style>

</head>
<body>

<!-- TOPBAR -->

<div class="topbar">
  <div class="logo">PhoneFlip</div>
  <div class="top-right">
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    <div class="saved-badge" onclick="openSaved()">💾 <span id="saved-count">0</span></div>
  </div>
</div>

<!-- STATS -->

<div class="stats">
  <div class="stat">
    <div class="stat-label">Deals</div>
    <div class="stat-value" id="s-leads">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Gem. winst</div>
    <div class="stat-value" id="s-marge">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Beste deal</div>
    <div class="stat-value" id="s-best">—</div>
  </div>
</div>

<!-- CARD AREA -->

<div class="card-area">
  <div class="shadow-card"></div>
  <div class="shadow-card"></div>
  <div class="main-card" id="main-card">
    <div class="state-screen">
      <div class="spinner"></div>
      <div class="state-title">Scannen...</div>
      <div class="state-sub">Echte Marktplaats deals ophalen</div>
    </div>
  </div>
</div>

<!-- ACTIONS -->

<div class="actions">
  <button class="action-btn btn-skip" onclick="skipDeal()">
    <span class="btn-icon">✕</span>
    <span class="btn-label">Skip</span>
  </button>
  <button class="action-btn btn-save" onclick="saveDeal()">
    <span class="btn-icon">💾</span>
    <span class="btn-label">Opslaan</span>
  </button>
  <button class="action-btn btn-next" onclick="nextDeal()">
    <span class="btn-icon">→</span>
    <span class="btn-label">Volgende</span>
  </button>
</div>

<!-- SAVED PANEL -->

<div id="saved-panel">
  <div class="panel-header">
    <div class="panel-title">💾 Opgeslagen deals</div>
    <button class="close-btn" onclick="closeSaved()">✕</button>
  </div>
  <div id="saved-list">
    <div class="empty-saved">
      <div class="ei">📭</div>
      <p>Nog niets opgeslagen.<br>Swipe rechts of druk 💾.</p>
    </div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────
const ZOEKTERMEN = [
  'iphone 13','iphone 12','iphone 11','samsung galaxy s22',
  'iphone 14','samsung galaxy s21','iphone xr','samsung galaxy a53',
  'iphone se','samsung galaxy s23','iphone 15','samsung galaxy a52',
  'iphone 12 pro','samsung galaxy s20','iphone 11 pro'
];
let zoekOffset = 0;
const PROXIES = [
  'https://corsproxy.io/?',
  'https://api.allorigins.win/raw?url=',
];

// Echte marktwaarden NL 2026 (verkooprijs particulier goede staat 128GB)
const MARKTWAARDEN = {
  'iphone 15 pro': 720, 'iphone 15': 600, 'iphone 14 pro': 620,
  'iphone 14': 480, 'iphone 13 pro': 450, 'iphone 13': 280,
  'iphone 12 pro': 240, 'iphone 12': 190, 'iphone 11 pro': 200,
  'iphone 11': 170, 'iphone xr': 140, 'iphone se': 130,
  'samsung galaxy s23': 500, 'samsung galaxy s22': 380,
  'samsung galaxy s21': 280, 'samsung galaxy s20': 220,
  'samsung galaxy a53': 230, 'samsung galaxy a52': 180,
};

function getMarktwaarde(titel) {
  const t = titel.toLowerCase();
  for (const [model, prijs] of Object.entries(MARKTWAARDEN)) {
    if (t.includes(model)) return prijs;
  }
  if (t.includes('iphone')) return 200;
  if (t.includes('samsung')) return 180;
  return 150;
}

const MARGES = { default: { mult: 1.28 } };

// ── STATE ─────────────────────────────────────────────────────────────
let deals = [];
let cur = 0;
let saved = [];
let isAnim = false;
let tx = 0, ty = 0, dx = 0, dragging = false;

// ── BOOT ──────────────────────────────────────────────────────────────
window.addEventListener('load', laadDeals);

// ── DATA ──────────────────────────────────────────────────────────────
async function nieuweDeals() { await laadDeals(); }
async function _oude_nieuweDeals_backup() {
  zoekOffset += 5; // volgende batch zoektermen
  if (zoekOffset >= ZOEKTERMEN.length) zoekOffset = 0;
  await laadDeals();
}

// ── BACKEND URL (verander na Render deployment) ──────────────────────
const API_URL = 'https://phoneflip-api.onrender.com/api/deals';

async function laadDeals() {
  toonLaad('Scannen...', 'Live Marktplaats deals ophalen');
  try {
    const res = await fetch(API_URL, { signal: AbortSignal.timeout(20000) });
    if (!res.ok) throw new Error('Server fout');
    const data = await res.json();
    deals = (data.deals || []);
    if (!deals.length) {
      toonFout('Geen kansen', 'Geen winstgevende deals gevonden. Probeer opnieuw.');
      return;
    }
    updateStats();
    cur = 0;
    toonDeal();
    initSwipe();
  } catch(e) {
    toonFout('Verbindingsfout', 'Server niet bereikbaar. Controleer internet.');
  }
}
async function OUDE_laadDeals_NIET_GEBRUIKEN() {
  toonLaad('skip', 'skip');
  const items = [];

  // Roteer door zoektermen via offset voor verse resultaten
  const termBatch = [
    ...ZOEKTERMEN.slice(zoekOffset),
    ...ZOEKTERMEN.slice(0, zoekOffset)
  ];

  for (const term of termBatch) {
    try {
      const batch = await zoekMP(term);
      items.push(...batch);
      if (items.length >= 20) break;
    } catch(e) {
      console.warn(term, e.message);
    }
  }

  if (!items.length) {
    toonFout('Geen verbinding', 'Controleer je internet en probeer opnieuw.');
    return;
  }

  deals = items.map(verwerk).filter(Boolean)
    .sort((a, b) => {
    // Hot deals altijd bovenaan, daarna op winst
    if (b.hot !== a.hot) return b.hot ? 1 : -1;
    return b.winstPerc - a.winstPerc;
  });

  updateStats();
  cur = 0;
  toonDeal();
  initSwipe();
}

async function zoekMP(query) {
  const url = `https://www.marktplaats.nl/lrp/api/search?query=${encodeURIComponent(query)}&l1CategoryId=20&l2CategoryId=328&priceFrom=50&priceTo=500&limit=15&offset=0&sortBy=SORT_INDEX&sortOrder=DECREASING`;

  for (const proxy of PROXIES) {
    try {
      const res = await fetch(proxy + encodeURIComponent(url), {
        signal: AbortSignal.timeout(9000)
      });
      if (!res.ok) continue;
      const data = await res.json();
      return data.listings || data.data?.listings || [];
    } catch(e) {
      console.warn('Proxy mislukt:', proxy);
    }
  }
  return [];
}

function verwerk(item) {
  try {
    const prijs = item.priceInfo?.priceCents
      ? Math.round(item.priceInfo.priceCents / 100)
      : 0;

    if (!prijs || prijs < 50 || prijs > 600) return null;

    const titel  = item.title || 'Auto';
    const desc   = (item.description || '').slice(0, 250);
    const loc    = item.location?.cityName || item.sellerLocation?.cityName || 'Nederland';
    const url    = item.vipUrl ? `https://www.marktplaats.nl${item.vipUrl}` : 'https://www.marktplaats.nl/l/auto-s/';
    const foto   = item.pictures?.[0]?.mediumUrl || item.pictures?.[0]?.extraExtraLargeUrl || null;
    const rawDate = item.date || item.startDate || item.since || null;
    let datum = 'Recent';
    if (rawDate) {
      try {
        // Marktplaats geeft soms epoch in ms, soms ISO string
        const d = typeof rawDate === 'number' ? new Date(rawDate) : new Date(rawDate);
        if (!isNaN(d.getTime())) {
          datum = d.toLocaleDateString('nl-NL', {day:'numeric', month:'short'});
        }
      } catch(e) { datum = 'Recent'; }
    }
    const verkoper = item.sellerInformation?.displayName || 'Particulier';

    const marktwaarde = getMarktwaarde(titel);
    // Alleen tonen als vraagprijs onder marktwaarde ligt
    if (prijs >= marktwaarde * 0.95) return null;
    const bod = Math.round(prijs * 0.82);
    const verkoop = Math.round(marktwaarde * 0.90);
    const winst = verkoop - bod;
    const winstPerc = Math.round(winst / bod * 100);

    const descL = desc.toLowerCase();
    const titelL = titel.toLowerCase();
    
    // Alleen iPhone en Samsung
    if (!titelL.includes('iphone') && !titelL.includes('samsung')) return null;
    
    // iCloud lock = niet verkoopbaar, overslaan
    if (descL.includes('icloud') && (descL.includes('lock') || descL.includes('geblokkeerd'))) return null;

    const heeftSchade = ['schade','barst','gebarsten','kapot','defect','kras','crack','broken'].some(w => descL.includes(w) || titelL.includes(w));
    const soort = heeftSchade ? 'schade'
      : (descL.includes('nieuw') || descL.includes('sealed')) ? 'nieuw'
      : descL.includes('snel weg') || descL.includes('emigrat') ? 'urgent'
      : 'gebruikt';

    const hot = winstPerc >= 30 || (soort === 'urgent') || (prijs < marktwaarde * 0.65);

    return { titel, desc, loc, url, foto, datum, verkoper, prijs, bod, verkoop, winst, winstPerc, soort, hot };
  } catch(e) { return null; }
}

// ── STATS ─────────────────────────────────────────────────────────────

  document.getElementById('s-leads').textContent = deals.length;

// ── SWIPE ─────────────────────────────────────────────────────────────
function initSwipe() {
  const card = document.getElementById('main-card');
  card.addEventListener('touchstart', e => {
    if (isAnim) return;
    tx = e.touches[0].clientX;
    ty = e.touches[0].clientY;
    dx = 0; dragging = false;
  }, { passive: true });

  card.addEventListener('touchmove', e => {
    if (isAnim) return;
    const ddx = e.touches[0].clientX - tx;
    const ddy = e.touches[0].clientY - ty;
    if (!dragging && Math.abs(ddy) > Math.abs(ddx)) return;
    dragging = true;
    e.preventDefault();
    dx = ddx;
    card.style.transition = 'none';
    card.style.transform = `translateX(${dx}px) rotate(${dx * .04}deg)`;
    const hs = document.getElementById('hint-save');
    const hk = document.getElementById('hint-skip');
    if (hs && hk) {
      hs.style.opacity = dx > 60 ? Math.min((dx-60)/70, 1) : 0;
      hk.style.opacity = dx < -60 ? Math.min((-dx-60)/70, 1) : 0;
    }
  }, { passive: false });

  card.addEventListener('touchend', () => {
    if (!dragging) return;
    dragging = false;
    if (dx > 110) saveDeal();
    else if (dx < -110) skipDeal();
    else {
      card.style.transition = 'transform .35s cubic-bezier(.22,.68,0,1.2)';
      card.style.transform = 'none';
      const hs = document.getElementById('hint-save');
      const hk = document.getElementById('hint-skip');
      if (hs) hs.style.opacity = 0;
      if (hk) hk.style.opacity = 0;
    }
  }, { passive: true });
}

// ── ACTIES ────────────────────────────────────────────────────────────
function animOut(dir, cb) {
  isAnim = true;
  const card = document.getElementById('main-card');
  card.style.transition = 'transform .28s ease, opacity .28s ease';
  card.style.transform = `translateX(${dir==='r'?500:-500}px) rotate(${dir==='r'?15:-15}deg)`;
  card.style.opacity = '0';
  setTimeout(() => { isAnim = false; cb(); initSwipe(); }, 290);
}

function skipDeal()  { if (!isAnim) animOut('l', () => { cur++; toonDeal(); }); }
function nextDeal()  { if (!isAnim) animOut('l', () => { cur++; toonDeal(); }); }
function saveDeal()  {
  if (isAnim || cur >= deals.length) return;
  saved.push(deals[cur]);
  document.getElementById('saved-count').textContent = saved.length;
  renderSaved();
  animOut('r', () => { cur++; toonDeal(); });
}

// ── SAVED ─────────────────────────────────────────────────────────────
function openSaved()  { const p = document.getElementById('saved-panel'); p.style.display = 'flex'; p.style.flexDirection = 'column'; }
function closeSaved() { document.getElementById('saved-panel').style.display = 'none'; }

function renderSaved() {
  const list = document.getElementById('saved-list');
  if (!saved.length) {
    list.innerHTML = '<div class="empty-saved"><div class="ei">📭</div><p>Nog niets opgeslagen.<br>Swipe rechts of druk 💾.</p></div>';
    return;

  list.innerHTML = saved.map(d => `

        <div class="si-winst">+€${d.winst.toLocaleString('nl-NL')}</div>
        <div class="si-lbl">winst</div>
      </div>
    </div>`).join('');
}
